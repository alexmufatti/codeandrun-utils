services:
  web:
    image: codeandrun-web:latest
    ports:
      - "3002:3000"
    env_file:
      - .env.local
    restart: unless-stopped

  garmin-sync:
    image: codeandrun-garmin-sync:latest
    env_file:
      - .env.local
    volumes:
      - garmin-tokens:/data/garmin_tokens
    restart: unless-stopped

volumes:
  garmin-tokens:
